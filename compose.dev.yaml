services:
  redis:
    image: redis:7-alpine
    container_name: routineplanner-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
  
  routineplanner-backend:
    container_name: routineplanner-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "10000:10000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  
  routineplanner-frontend:
    image: nginx:alpine
    container_name: routineplanner-frontend-dev
    restart: unless-stopped
    ports:
      - "5500:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - routineplanner-backend